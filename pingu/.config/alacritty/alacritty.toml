general.import = [
    # "gruvbox.toml"
    # "tokyonight_night.toml"
    # "kanagawa.toml"
    "theme.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 11.0

[font.bold]
# family = "Spline Sans Mono"
# family = "JetBrains Mono Nerd Font"
family = "Roboto Mono"
style = "Bold"

[font.bold_italic]
# family = "Spline Sans Mono"
# family = "JetBrains Mono Nerd Font"
family = "Roboto Mono"
style = "Bold Italic"

[font.italic]
# family = "Spline Sans Mono"
# family = "JetBrains Mono Nerd Font"
family = "Roboto Mono"
style = "Italic"

[font.normal]
# family = "Spline Sans Mono"
# family = "Inconsolata"
# family = "Source Code Pro"
# family = "JetBrains Mono Nerd Font"
family = "Roboto Mono"
style = "Regular"

[window]
dynamic_title = true
opacity = 0.90

[window.padding]
x = 8
y = 8
